<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquérito aos Pais 2026</title>
    <style>
        :root { 
            --valsassina-blue: #002137; 
            --bg-light: #f4f7fa; 
            --card-bg: #ffffff; 
            --text-main: #1e293b; 
        }
        body { 
            font-family: "Segoe UI", Arial, sans-serif; 
            background: var(--bg-light); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            box-sizing: border-box;
        }
        .container { 
            max-width: 500px; 
            width: 100%; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,33,55,0.05); 
            border: 1px solid #e2e8f0; 
            text-align: center;
            box-sizing: border-box;
        }
        .logo { max-width: 180px; height: auto; margin-bottom: 25px; }
        h1 { color: var(--valsassina-blue); font-size: 1.4em; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
        p { font-size: 0.95em; line-height: 1.5; color: #64748b; margin-bottom: 30px; }
        
        .btn-clique { 
            display: inline-block;
            width: 100%; 
            background: var(--valsassina-blue); 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1em; 
            font-weight: 800; 
            text-decoration: none; 
            text-transform: uppercase; 
            transition: background 0.2s;
            box-sizing: border-box;
            cursor: pointer;
        }
        .btn-clique:hover { background: #003356; }
        
        /* Mensagem de redirecionamento automático */
        .loading-text { font-weight: 600; color: var(--valsassina-blue); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://lh3.googleusercontent.com/d/1jVRU6cfYAtBA2ITjsK46sJwbKDzGd9gW" class="logo" alt="Valsassina">
    
    <h1>Inquérito aos Pais 2026</h1>
    
    <div id="redirectStatus" class="loading-text">A redirecionar para o formulário seguro...</div>
    <p>Se não for redirecionado automaticamente dentro de 3 segundos, por favor clique no botão abaixo.</p>
    
    <a href="https://script.google.com/macros/s/AKfycbxGyEHz0_Ji8tIyEMQDBczsFlmAijeWs754jT2uM7cX_Dm666lAhsK9dDwu_lvwMGcfZQ/exec?authuser=0" id="manualLink" class="btn-clique">
        Clique Aqui para Responder
    </a>
</div>

<script>
    // URL do teu Web App original da Google (que gera o HTML com as listas)
    const targetURL = "https://script.google.com/macros/s/AKfycbxGyEHz0_Ji8tIyEMQDBczsFlmAijeWs754jT2uM7cX_Dm666lAhsK9dDwu_lvwMGcfZQ/exec?authuser=0";

    // EXECUÇÃO PROGRAMÁTICA: Força o navegador a saltar para o link limpando a sessão
    try {
        // Substitui o histórico da página corrente para evitar loops de retrocesso do utilizador
        window.location.replace(targetURL);
    } catch (e) {
        // Caso o navegador bloqueie o comportamento automático, atualiza o texto e deixa o botão disponível
        document.getElementById("redirectStatus").innerText = "Por favor, utilize o botão abaixo para aceder:";
        console.error("Redirecionamento automático intercetado:", e);
    }
</script>
</body>
</html>
