<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquérito aos Pais 2026</title>
    <style>
        /* DEFINIÇÃO DE VARIÁVEIS DE CORES (Identidade Visual) */
        :root { 
            --valsassina-blue: #002137; 
            --bg-light: #f4f7fa; 
            --card-bg: #ffffff; 
            --text-main: #1e293b; 
        }
        
        /* ESTILIZAÇÃO DA PÁGINA (Centramento Absoluto) */
        body { 
            font-family: "Segoe UI", Arial, sans-serif; 
            background: var(--bg-light); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; /* Ocupa 100% da altura do ecrã */
            box-sizing: border-box;
        }
        
        /* CARTÃO DE ENQUADRAMENTO */
        .container { 
            max-width: 500px; 
            width: 100%; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,33,55,0.05); 
            border: 1px solid #e2e8f0; 
            text-align: center;
            box-sizing: border-box;
        }
        
        .logo { max-width: 180px; height: auto; margin-bottom: 25px; }
        h1 { color: var(--valsassina-blue); font-size: 1.4em; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
        p { font-size: 0.95em; line-height: 1.5; color: #64748b; margin-bottom: 30px; }
        
        /* ESTILO DO BOTÃO DE REDIRECIONAMENTO */
        .btn-clique { 
            display: inline-block;
            width: 100%; 
            background: var(--valsassina-blue); 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1em; 
            font-weight: 800; 
            text-decoration: none; 
            text-transform: uppercase; 
            transition: background 0.2s;
            box-sizing: border-box;
            cursor: pointer;
        }
        .btn-clique:hover {
            background: #003356; /* Efeito visual ao passar o rato */
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Imagem do Logótipo do Colégio -->
    <img src="https://drive.google.com/uc?export=view&id=1jVRU6cfYAtBA2ITjsK46sJwbKDzGd9gW" class="logo" alt="Valsassina">
    
    <h1>Inquérito aos Pais 2026</h1>
    <p>Para iniciar o preenchimento do inquérito de forma segura e sem erros de conta, por favor clique no botão abaixo.</p>
    
    <!-- LINK DE REDIRECIONAMENTO COM PARÂMETRO LIMPO (?authuser=0) -->
    <a href="https://script.google.com/a/macros/cvalsassina.pt/s/AKfycbyU7SYlzxBWzfUsOvMjKF3e0vf6DWIQurrVqlPmu9YpTahWqqNUKQd_OF3_MZkqFQKX2g/exec?authuser=0" class="btn-clique">
        Clique Aqui para Responder
    </a>
</div>

</body>
</html>
