<div class="survey-container-wp">
    <div class="logo-container" style="text-align: center; margin-bottom: 20px;">
        <img src="https://drive.google.com/uc?export=view&id=1jVRU6cfYAtBA2ITjsK46sJwbKDzGd9gW" style="max-width: 200px; height: auto;" alt="Logo">
    </div>
    <h1 style="color: #002137; text-align: center;">Inquérito aos Pais (2026)</h1>
    <div style="background: #e8f4fd; padding: 15px; border-radius: 8px; margin-bottom: 25px; border-left: 5px solid #002137; font-size: 0.9em;">
        Avalie de 1 (Muito Pouco) a 5 (Muito). O inquérito é anónimo.
    </div>

    <form id="wpSurveyForm">
        <div style="display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 150px;"><label style="display:block; font-weight:bold;">Ano:</label><input type="text" name="ano" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;"></div>
            <div style="flex: 1; min-width: 150px;"><label style="display:block; font-weight:bold;">Turma:</label><input type="text" name="turma" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;"></div>
            <div style="flex: 1; min-width: 150px;"><label style="display:block; font-weight:bold;">Ciclo:</label><input type="text" name="ciclo" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;"></div>
        </div>

        <div id="wpPerguntasContainer"></div>

        <div class="section-title" style="background: #002137; color: white; padding: 8px 15px; margin-top: 25px; border-radius: 4px; font-weight:bold;">Assinale três aspetos que mais valoriza no Colégio</div>
        <input type="text" name="v1" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top:10px" placeholder="1.">
        <input type="text" name="v2" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top:10px" placeholder="2.">
        <input type="text" name="v3" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top:10px" placeholder="3.">

        <div class="section-title" style="background: #002137; color: white; padding: 8px 15px; margin-top: 25px; border-radius: 4px; font-weight:bold;">Assinale três aspetos que deveriam ser melhorados</div>
        <input type="text" name="m1" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top:10px" placeholder="1.">
        <input type="text" name="m2" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top:10px" placeholder="2.">
        <input type="text" name="m3" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top:10px" placeholder="3.">

        <button type="submit" id="wpSubmitBtn" style="width: 100%; background: #002137; color: white; padding: 15px; border: none; border-radius: 6px; font-size: 1.1em; cursor: pointer; margin-top: 20px; text-transform: uppercase; font-weight: bold;">Submeter Respostas</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/a/macros/cvalsassina.pt/s/AKfycbyU7SYlzxBWzfUsOvMjKF3e0vf6DWIQurrVqlPmu9YpTahWqqNUKQd_OF3_MZkqFQKX2g/exec';
    
    const perguntas = [
        "Identifico-me com o sistema de valores do Colégio",
        "Estou satisfeito com o trabalho da Educadora",
        "A comunicação com a Educadora é fácil e fluida",
        "A comunicação com os Directores e Coordenadora é fácil e fluida",
        "Existe um bom clima de harmonia e convivência entre as crianças",
        "As actividades extra-escolares complementam a formação das crianças",
        "As ementas que o refeitório oferece são equilibradas e saudáveis",
        "O custo do Colégio corresponde à qualidade da sua oferta educativa",
        "Em geral, a educação que compete ao Colégio corresponde às minhas expectativas"
    ];

    const container = document.getElementById('wpPerguntasContainer');
    perguntas.forEach((t, i) => {
        const n = i + 1;
        container.innerHTML += `
            <div style="margin: 15px 0; padding: 10px; border-bottom: 1px solid #eee;">
                <label style="font-weight: 600; color: #002137;">${n}. ${t}</label>
                <div style="display: flex; justify-content: space-between; max-width: 450px; margin-top: 10px;">
                    ${[1,2,3,4,5].map(v => `<label style="cursor:pointer; display:flex; flex-direction:column; align-items:center;"><input type="radio" name="p${n}" value="${v}" required> ${v}</label>`).join('')}
                </div>
            </div>`;
    });

    const form = document.getElementById('wpSurveyForm');
    const btn = document.getElementById('wpSubmitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "A enviar...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors'})
            .then(() => {
                alert('Inquérito enviado com sucesso! Obrigado pela sua participação.');
                form.reset();
                window.scrollTo(0,0);
            })
            .catch(() => alert('Erro na submissão. Por favor, tente novamente.'))
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "Submeter Respostas";
            });
    });
</script>
